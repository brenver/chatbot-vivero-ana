<!DOCTYPE html>
<html>
<head>
    <title>Vivero Ana - Asistente Virtual</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f7f0; }
        .chat-container {
            max-width: 700px;
            margin: 30px auto;
        }
        .chat-header {
            background-color: #2d6a4f;
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            text-align: center;
        }
        .chat-box {
            background: white;
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            border-left: 1px solid #ddd;
            border-right: 1px solid #ddd;
        }
        .mensaje-usuario {
            background-color: #2d6a4f;
            color: white;
            padding: 10px 15px;
            border-radius: 15px 15px 0 15px;
            margin: 8px 0;
            max-width: 75%;
            margin-left: auto;
        }
        .mensaje-bot {
            background-color: #e8f5e9;
            color: #1b1b1b;
            padding: 10px 15px;
            border-radius: 15px 15px 15px 0;
            margin: 8px 0;
            max-width: 75%;
        }
        .chat-input {
            background: white;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 0 0 10px 10px;
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        <h4>🌿 Vivero Ana</h4>
        <small>Asistente virtual — La Reja, Moreno</small>
    </div>
    <div class="chat-box" id="chat-box">
        <div class="mensaje-bot">
            ¡Hola! Soy el asistente virtual del Vivero Ana 🌱 ¿En qué te puedo ayudar hoy?
        </div>
    </div>
    <div class="chat-input">
        <div class="input-group">
            <input type="text" id="input-mensaje" class="form-control" placeholder="Escribí tu consulta..." autocomplete="off">
            <button class="btn" style="background-color: #2d6a4f; color: white;" onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>
</div>

<script>
async function enviarMensaje() {
    const input = document.getElementById('input-mensaje');
    const mensaje = input.value.trim();
    if (!mensaje) return;

    agregarMensaje(mensaje, 'usuario');
    input.value = '';

    agregarMensaje('Escribiendo...', 'bot', 'typing');

    const respuesta = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mensaje })
    });

    const data = await respuesta.json();
    document.getElementById('typing')?.remove();
    agregarMensaje(data.respuesta, 'bot');
}

function agregarMensaje(texto, tipo, id = '') {
    const box = document.getElementById('chat-box');
    const div = document.createElement('div');
    div.className = tipo === 'usuario' ? 'mensaje-usuario' : 'mensaje-bot';
    if (id) div.id = id;
    div.innerText = texto;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

document.getElementById('input-mensaje').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') enviarMensaje();
});
</script>
</body>
</html>
